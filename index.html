<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сбор на бутылку</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #ffffff; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { margin-bottom: 20px; text-align: center; font-size: 1.5em; color: #1a1a1a; }
        
        /* 🎬 ЭКРАН ЗАГРУЗКИ */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            max-width: 400px;
            position: fixed;
            top: 0;
            left: 0;
            background: white;
            z-index: 10000;
        }
        .loading-title {
            font-size: 1.5em;
            margin-bottom: 40px;
            text-align: center;
            color: #1a1a1a;
        }
        .loading-bar-container {
            width: 80%;
            height: 40px;
            background: #e5e5e5;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d1d1d1;
        }
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            width: 0%;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .loading-percent {            font-size: 2em;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 10px;
        }
        .loading-text {
            color: #666;
            font-size: 0.9em;
        }
        
        .login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; max-width: 400px; }
        .login-input { width: 100%; padding: 15px; font-size: 1.2em; border: 2px solid #d1d1d1; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .login-btn { width: 100%; padding: 15px; font-size: 1.2em; font-weight: bold; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .login-btn:active { transform: scale(0.98); }
        .main-screen { display: none; width: 100%; max-width: 400px; }
        .container { width: 100%; }
        .user-info { background: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9em; }
        .progress-container { width: 100%; height: 60px; background: #e5e5e5; border-radius: 30px; overflow: hidden; position: relative; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #d1d1d1; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); position: absolute; left: 0; top: 0; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); transition: width 0.5s ease-out; }
        .progress-fill.negative { background: linear-gradient(90deg, #f87171, #ef4444); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); left: auto; right: 0; }
        .progress-text { position: relative; z-index: 10; font-size: 1.8em; font-weight: bold; color: #1a1a1a; text-shadow: 0 1px 2px rgba(255,255,255,0.8); text-align: center; line-height: 56px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }
        .buttons { display: flex; flex-direction: column; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .button-row { display: flex; gap: 20px; justify-content: center; }
        .btn { width: 80px; height: 80px; border: none; border-radius: 50%; font-size: 1.5em; font-weight: bold; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn:active { transform: scale(0.95); }
        .btn-minus-1 { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-plus-1 { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-minus-10 { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .btn-plus-10 { background: linear-gradient(135deg, #a855f7, #9333ea); color: white; }
        .contributors-section { margin-top: 30px; }
        .section-title { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; text-align: center; color: #1a1a1a; }
        .contributors-list { background: #f9f9f9; border-radius: 10px; padding: 15px; max-height: 300px; overflow-y: auto; }
        .contributor-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 8px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .contributor-name { font-weight: 600; color: #1a1a1a; }
        .contributor-amount { font-weight: bold; color: #22c55e; }
        .contributor-amount.negative { color: #ef4444; }
        .info { text-align: center; color: #666; font-size: 0.9em; margin-top: 20px; }
        #loading { text-align: center; color: #666; margin-top: 20px; }
        .logout-btn { margin-top: 20px; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        .error-message { background: #fee; color: #c00; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <!-- 🎬 ЭКРАН ЗАГРУЗКИ -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-title">💰 Сбор на бутылку Владу</div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loadingBar"></div>
        </div>        <div class="loading-text">Загрузка приложения...</div>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div id="loginScreen" class="login-screen">
        <h1>💰 Сбор на бутылку Владу</h1>
        <div id="errorMessage" class="error-message"></div>
        <input type="text" id="userNameInput" class="login-input" placeholder="Введите ваше имя" maxlength="20">
        <button id="loginButton" class="login-btn" onclick="login()">Начать сбор!</button>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="mainScreen" class="main-screen">
        <h1>💰 Сбор на бутылку Владу</h1>
        <div class="container">
            <div class="user-info">
                👤 <span id="currentUserName">Гость</span> | 
                Ваш вклад: <span id="currentUserContribution">0</span>₽
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-text" id="progressText">Загрузка...</div>
            </div>
            <div class="buttons">
                <div class="button-row">
                    <button class="btn btn-minus-10" onclick="changeAmount(-10)">−10</button>
                    <button class="btn btn-plus-10" onclick="changeAmount(10)">+10</button>
                </div>
                <div class="button-row">
                    <button class="btn btn-minus-1" onclick="changeAmount(-1)">−</button>
                    <button class="btn btn-plus-1" onclick="changeAmount(1)">+</button>
                </div>
            </div>
            <div class="info">
                Цель: 1000₽ | Макс: 11111₽<br>
                <span id="status">Общий сбор</span>
            </div>
            <div id="loading">🔄 Синхронизация...</div>
            <div class="contributors-section">
                <div class="section-title">📊 Участники сбора</div>
                <div id="contributorsList" class="contributors-list">Загрузка списка...</div>
            </div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>        // 🔥 FIREBASE КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyAh3Gu_cbxJEZZY92K8m1VQE34mifAQGTY",
            authDomain: "vldbotlesborbot-e82f4.firebaseapp.com",
            databaseURL: "https://vldbotlesborbot-e82f4-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vldbotlesborbot-e82f4",
            storageBucket: "vldbotlesborbot-e82f4.firebasestorage.app",
            messagingSenderId: "53516956583",
            appId: "1:53516956583:web:8bee91ac1ca3e67a4bfc82"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUserName = '';
        let currentUserId = null;
        let currentAmount = 0;
        const targetAmount = 1000;
        const negativeMax = 11111;
        const maxDisplay = 11111;

        // 🎬 ЭКРАН ЗАГРУЗКИ (5 СЕКУНД)
        window.addEventListener('load', () => {
            let progress = 0;
            const loadingBar = document.getElementById('loadingBar');
            const loadingPercent = document.getElementById('loadingPercent');
            
            const loadingInterval = setInterval(() => {
                progress += 2; // 100% / 50 шагов = 2% за шаг
                if (progress > 100) progress = 100;
                
                loadingBar.style.width = progress + '%';
                loadingPercent.textContent = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        checkLogin();
                    }, 500);
                }
            }, 100); // 100ms * 50 шагов = 5000ms = 5 секунд
        });

        function checkLogin() {
            const savedName = localStorage.getItem('bottleUserName');
            const savedId = localStorage.getItem('bottleUserId');
            if (savedName && savedId) {
                currentUserName = savedName;
                currentUserId = savedId;                showMainScreen();
            } else {
                showLoginScreen();
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function login() {
            hideError();
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) { showError('Введите имя!'); return; }
            currentUserName = name;
            currentUserId = Date.now().toString();
            localStorage.setItem('bottleUserName', currentUserName);
            localStorage.setItem('bottleUserId', currentUserId);
            db.ref('contributors/' + currentUserId).set({
                name: currentUserName,
                totalAmount: 0,
                lastActive: Date.now()
            }).then(() => {
                showMainScreen();
            }).catch((error) => {
                showError('Ошибка: ' + error.message);
            });
        }

        function logout() {
            localStorage.removeItem('bottleUserName');
            localStorage.removeItem('bottleUserId');
            currentUserName = '';
            currentUserId = null;
            showLoginScreen();
        }

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
        }

        function showMainScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('currentUserName').textContent = currentUserName;            db.ref('totalAmount').on('value', (snapshot) => {
                currentAmount = snapshot.val() !== null ? snapshot.val() : 0;
                updateDisplay();
                document.getElementById('loading').style.display = 'none';
            });
            db.ref('contributors').on('value', (snapshot) => {
                updateContributorsList(snapshot.val());
            });
            if (currentUserId) {
                db.ref('contributors/' + currentUserId + '/lastActive').set(Date.now());
                window.activeInterval = setInterval(() => {
                    db.ref('contributors/' + currentUserId + '/lastActive').set(Date.now());
                }, 10000);
            }
        }

        function updateContributorsList(contributors) {
            const listDiv = document.getElementById('contributorsList');
            if (!contributors || Object.keys(contributors).length === 0) {
                listDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Пока нет участников</div>';
                return;
            }
            const contributorsArray = Object.entries(contributors).map(([id, data]) => ({
                id, name: data.name || 'Аноним', amount: data.totalAmount || 0
            }));
            contributorsArray.sort((a, b) => b.amount - a.amount);
            let html = '';
            contributorsArray.forEach((contributor, index) => {
                const isCurrentUser = contributor.id === currentUserId;
                const amountClass = contributor.amount < 0 ? 'negative' : '';
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                html += `<div class="contributor-item" style="${isCurrentUser ? 'border: 2px solid #22c55e;' : ''}">
                    <span class="contributor-name">${medal} ${contributor.name}${isCurrentUser ? ' (вы)' : ''}</span>
                    <span class="contributor-amount ${amountClass}">${contributor.amount}₽</span>
                </div>`;
            });
            listDiv.innerHTML = html;
            const currentUserData = contributorsArray.find(c => c.id === currentUserId);
            if (currentUserData) {
                document.getElementById('currentUserContribution').textContent = currentUserData.amount;
            }
        }

        function formatNumber(num) {
            if (num >= maxDisplay) return '∞';
            if (num <= -negativeMax) return '-∞';
            return num + '₽';
        }

        function updateDisplay() {            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const status = document.getElementById('status');
            progressText.textContent = formatNumber(currentAmount);
            let percentage = currentAmount >= targetAmount ? 100 : currentAmount <= 0 ? 0 : (currentAmount / targetAmount) * 100;
            if (currentAmount < 0) {
                percentage = Math.min(100, (Math.abs(currentAmount) / negativeMax) * 100);
                progressFill.classList.add('negative');
                status.textContent = '📉 Долг: ' + Math.abs(currentAmount) + '₽';
            } else if (currentAmount < targetAmount) {
                progressFill.classList.remove('negative');
                status.textContent = '📈 Осталось: ' + (targetAmount - currentAmount) + '₽';
            } else if (currentAmount >= maxDisplay) {
                status.textContent = '🚀 БЕСКОНЕЧНОСТЬ!';
            } else {
                progressFill.classList.remove('negative');
                status.textContent = '✅ Цель достигнута! +' + (currentAmount - targetAmount) + '₽';
            }
            progressFill.style.width = percentage + '%';
        }

        function changeAmount(delta) {
            const newTotalAmount = currentAmount + delta;
            if (newTotalAmount > 11111 || newTotalAmount < -11111) {
                alert('Достигнут лимит!');
                return;
            }
            db.ref('totalAmount').set(newTotalAmount);
            if (currentUserId) {
                db.ref('contributors/' + currentUserId).transaction((data) => {
                    if (data) {
                        data.totalAmount = (data.totalAmount || 0) + delta;
                        data.lastActive = Date.now();
                    }
                    return data;
                });
            }
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
