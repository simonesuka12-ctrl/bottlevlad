<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сбор на бутылку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
            color: #1a1a1a;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .progress-container {
            width: 100%;
            height: 60px;
            background: #e5e5e5;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d1d1d1;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            transition: width 0.5s ease-out;
        }

        .progress-fill.negative {
            background: linear-gradient(90deg, #f87171, #ef4444);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            left: auto;
            right: 0;
        }

        .progress-text {
            position: relative;
            z-index: 10;
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a1a;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
            text-align: center;
            line-height: 56px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .button-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            width: 80px;
            height: 80px;            border: none;
            border-radius: 50%;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-minus-1 {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-plus-1 {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-minus-10 {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }

        .btn-plus-10 {
            background: linear-gradient(135deg, #a855f7, #9333ea);
            color: white;
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        #loading {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>💰 Сбор на бутылку Владу</h1>
        <div class="container">
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-text" id="progressText">Загрузка...</div>
        </div>

        <div class="buttons">
            <!-- Кнопки по 10₽ -->
            <div class="button-row">
                <button class="btn btn-minus-10" onclick="changeAmount(-10)">−10</button>
                <button class="btn btn-plus-10" onclick="changeAmount(10)">+10</button>
            </div>

            <!-- Кнопки по 1₽ -->
            <div class="button-row">
                <button class="btn btn-minus-1" onclick="changeAmount(-1)">−</button>
                <button class="btn btn-plus-1" onclick="changeAmount(1)">+</button>
            </div>
        </div>

        <div class="info">
            Цель: 1000₽ | Макс: 11111₽<br>
            <span id="status">Общий сбор</span>
        </div>
        
        <div id="loading">🔄 Синхронизация...</div>
    </div>

    <!-- 🔥 FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 🔥 ВСТАВЬ СЮДА СВОЙ КОНФИГ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "СЮДА_ВСТАВИТЬ_apiKey",
            authDomain: "СЮДА_ВСТАВИТЬ_authDomain",
            databaseURL: "СЮДА_ВСТАВИТЬ_databaseURL",
            projectId: "СЮДА_ВСТАВИТЬ_projectId",
            storageBucket: "СЮДА_ВСТАВИТЬ_storageBucket",
            messagingSenderId: "СЮДА_ВСТАВИТЬ_messagingSenderId",
            appId: "СЮДА_ВСТАВИТЬ_appId"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Переменные
        let currentAmount = 0;        const targetAmount = 1000;
        const negativeMax = 11111;
        const maxDisplay = 11111;

        // Чтение данных из Firebase
        db.ref('bottleAmount').on('value', (snapshot) => {
            const data = snapshot.val();
            currentAmount = data !== null ? data : 0;
            updateDisplay();
            document.getElementById('loading').style.display = 'none';
        });

        // Форматирование числа
        function formatNumber(num) {
            if (num >= maxDisplay) {
                return '∞';
            } else if (num <= -negativeMax) {
                return '-∞';
            } else {
                return num + '₽';
            }
        }

        // Обновление отображения
        function updateDisplay() {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const status = document.getElementById('status');

            progressText.textContent = formatNumber(currentAmount);

            let percentage;
            
            if (currentAmount >= targetAmount) {
                percentage = 100;
            } else if (currentAmount <= 0) {
                percentage = 0;
            } else {
                percentage = (currentAmount / targetAmount) * 100;
            }

            if (currentAmount < 0) {
                percentage = (Math.abs(currentAmount) / negativeMax) * 100;
                percentage = Math.min(100, percentage);
                progressFill.classList.add('negative');
                status.textContent = '📉 Долг: ' + Math.abs(currentAmount) + '₽';
            } else if (currentAmount < targetAmount) {
                progressFill.classList.remove('negative');
                status.textContent = '📈 Осталось: ' + (targetAmount - currentAmount) + '₽';
            } else if (currentAmount >= maxDisplay) {                status.textContent = '🚀 БЕСКОНЕЧНОСТЬ!';
            } else {
                progressFill.classList.remove('negative');
                status.textContent = '✅ Цель достигнута! +' + (currentAmount - targetAmount) + '₽';
            }

            progressFill.style.width = percentage + '%';
        }

        // Изменение суммы
        function changeAmount(delta) {
            const newAmount = currentAmount + delta;
            
            // Ограничения
            if (newAmount > 11111 || newAmount < -11111) {
                return;
            }

            // Запись в Firebase
            db.ref('bottleAmount').set(newAmount)
                .then(() => {
                    console.log('Updated:', newAmount);
                })
                .catch((error) => {
                    console.error('Error:', error);
                });

            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
    </script>
</body>
</html>
